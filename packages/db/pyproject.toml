[project]
name = "snip-db"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "sqlalchemy>=2.0",
    "alembic>=1.13",
    "psycopg[binary]>=3.1",
    "greenlet>=3.3.2",
]

[project.optional-dependencies]
pg = ["asyncpg>=0.29"]
dev = ["pytest", "pytest-asyncio", "pytest-cov", "ruff", "aiosqlite"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.ruff]
target-version = "py312"
line-length = 100
exclude = ["src/snip_db/migrations"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = [
    "UP006",  # Keep typing.List/Dict/Tuple for Python 3.12 runtime compat
    "UP007",  # Keep Optional[X] for Python 3.12 runtime compat
    "UP035",  # Keep typing.List/Dict/Tuple imports for Python 3.12 runtime compat
    "UP045",  # Keep Optional[X] for Python 3.12 runtime compat
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.coverage.run]
omit = [
    "src/snip_db/migrations/*",
    "src/snip_db/engine.py",
    "src/snip_db/types/*",
]
