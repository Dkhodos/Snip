[project]
name = "snip-db"
version = "0.1.0"
requires-python = ">=3.14"
dependencies = [
    "sqlalchemy>=2.0",
    "alembic>=1.13",
    "psycopg[binary]>=3.1",
    "greenlet>=3.3.2"
]

[project.optional-dependencies]
pg = ["asyncpg>=0.29"]

[dependency-groups]
dev = ["aiosqlite"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.ruff]
line-length = 100
exclude = ["src/snip_db/migrations"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = [
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.pyright]
pythonVersion = "3.14"
typeCheckingMode = "standard"
exclude = ["src/snip_db/migrations", "tests"]

[tool.coverage.run]
omit = [
    "src/snip_db/migrations/*",
    "src/snip_db/engine.py",
    "src/snip_db/types/*"
]
