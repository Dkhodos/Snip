[project]
name = "snip-og-image"
version = "0.1.0"
requires-python = ">=3.14"
dependencies = [
    "Pillow>=10.1.0",
    "httpx",
    "snip-storage",
    "snip-logger"
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv.sources]
snip-storage = { workspace = true }
snip-logger = { workspace = true }

[tool.ruff]
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = [
    "UP035",
    "UP045"
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.pyright]
pythonVersion = "3.14"
typeCheckingMode = "standard"
exclude = ["tests"]
