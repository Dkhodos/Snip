[project]
name = "snip-email"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "resend>=2.0",
    "aiosmtplib>=3.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = [
    "UP006",
    "UP007",
    "UP035",
    "UP045",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.pyright]
pythonVersion = "3.12"
typeCheckingMode = "standard"
exclude = ["tests"]
