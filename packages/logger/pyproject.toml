[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "snip-logger"
version = "0.1.0"
requires-python = ">=3.14"
dependencies = ["structlog>=24.0", "fastapi[standard]"]

[tool.hatch.build.targets.wheel]
packages = ["src/snip_logger"]

[tool.ruff]
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = ["UP006", "UP007", "UP035", "UP045"]

[tool.pyright]
include = ["src"]
pythonVersion = "3.14"
typeCheckingMode = "standard"
