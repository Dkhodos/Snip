[project]
name = "snip-auth"
version = "0.1.0"
requires-python = ">=3.14"
dependencies = [
    "httpx",
    "PyJWT[crypto]>=2.8.0",
    "cryptography>=42.0.0"
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.ruff]
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = [
    "UP035",
    "UP045"
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.pyright]
pythonVersion = "3.14"
typeCheckingMode = "standard"
exclude = ["tests"]
