repos:
  - repo: local
    hooks:

      # ── Python packages: lint (ruff check + format + pyright) ──
      - id: lint-snip-auth
        name: "lint: snip-auth"
        entry: make auth:lint
        language: system
        files: ^packages/auth/.*\.py$
        pass_filenames: false

      - id: lint-snip-db
        name: "lint: snip-db"
        entry: make db:lint
        language: system
        files: ^packages/db/.*\.py$
        pass_filenames: false

      - id: lint-snip-email
        name: "lint: snip-email"
        entry: make email:lint
        language: system
        files: ^packages/email/.*\.py$
        pass_filenames: false

      - id: lint-snip-logger
        name: "lint: snip-logger"
        entry: make logger:lint
        language: system
        files: ^packages/logger/.*\.py$
        pass_filenames: false

      - id: lint-snip-analytics
        name: "lint: snip-analytics"
        entry: make analytics:lint
        language: system
        files: ^packages/analytics/.*\.py$
        pass_filenames: false

      - id: lint-snip-queue
        name: "lint: snip-queue"
        entry: make queue:lint
        language: system
        files: ^packages/queue/.*\.py$
        pass_filenames: false

      - id: lint-snip-storage
        name: "lint: snip-storage"
        entry: make storage:lint
        language: system
        files: ^packages/storage/.*\.py$
        pass_filenames: false

      - id: lint-snip-og-image
        name: "lint: snip-og-image"
        entry: make og-image:lint
        language: system
        files: ^packages/og-image/.*\.py$
        pass_filenames: false

      - id: lint-click-worker
        name: "lint: click-worker"
        entry: make click-worker:lint
        language: system
        files: ^apps/click-worker/.*\.py$
        pass_filenames: false

      - id: lint-redirect-service
        name: "lint: redirect-service"
        entry: make redirect-service:lint
        language: system
        files: ^apps/redirect-service/.*\.py$
        pass_filenames: false

      - id: lint-dashboard-backend
        name: "lint: dashboard-backend"
        entry: make dashboard-backend:lint
        language: system
        files: ^apps/dashboard-backend/.*\.py$
        pass_filenames: false

      # ── Python packages: type check (pyright) ──────────────────
      - id: typecheck-snip-auth
        name: "type-check: snip-auth"
        entry: make auth:type:check
        language: system
        files: ^packages/auth/.*\.py$
        pass_filenames: false

      - id: typecheck-snip-db
        name: "type-check: snip-db"
        entry: make db:type:check
        language: system
        files: ^packages/db/.*\.py$
        pass_filenames: false

      - id: typecheck-snip-email
        name: "type-check: snip-email"
        entry: make email:type:check
        language: system
        files: ^packages/email/.*\.py$
        pass_filenames: false

      - id: typecheck-snip-logger
        name: "type-check: snip-logger"
        entry: make logger:type:check
        language: system
        files: ^packages/logger/.*\.py$
        pass_filenames: false

      - id: typecheck-snip-analytics
        name: "type-check: snip-analytics"
        entry: make analytics:type:check
        language: system
        files: ^packages/analytics/.*\.py$
        pass_filenames: false

      - id: typecheck-snip-queue
        name: "type-check: snip-queue"
        entry: make queue:type:check
        language: system
        files: ^packages/queue/.*\.py$
        pass_filenames: false

      - id: typecheck-snip-storage
        name: "type-check: snip-storage"
        entry: make storage:type:check
        language: system
        files: ^packages/storage/.*\.py$
        pass_filenames: false

      - id: typecheck-snip-og-image
        name: "type-check: snip-og-image"
        entry: make og-image:type:check
        language: system
        files: ^packages/og-image/.*\.py$
        pass_filenames: false

      - id: typecheck-click-worker
        name: "type-check: click-worker"
        entry: make click-worker:type:check
        language: system
        files: ^apps/click-worker/.*\.py$
        pass_filenames: false

      - id: typecheck-redirect-service
        name: "type-check: redirect-service"
        entry: make redirect-service:type:check
        language: system
        files: ^apps/redirect-service/.*\.py$
        pass_filenames: false

      - id: typecheck-dashboard-backend
        name: "type-check: dashboard-backend"
        entry: make dashboard-backend:type:check
        language: system
        files: ^apps/dashboard-backend/.*\.py$
        pass_filenames: false

      # ── DevOps: PKL config validation ────────────────────────
      - id: pkl-devops-config
        name: "pkl: devops config"
        entry: make devops:check
        language: system
        files: ^\.devops/(pkl|values|secrets|services)/
        pass_filenames: false

      # ── Terraform: Checkov security scan ─────────────────────
      - id: checkov-terraform
        name: "checkov: terraform"
        entry: make terraform:check
        language: system
        files: ^terraform/.*\.(tf|hcl)$
        pass_filenames: false

      # ── Frontend ───────────────────────────────────────────────
      - id: lint-dashboard-frontend
        name: "lint: dashboard-frontend"
        entry: make dashboard-frontend:lint
        language: system
        files: ^apps/dashboard-frontend/.*\.(ts|tsx|js|jsx)$
        pass_filenames: false

      - id: typecheck-dashboard-frontend
        name: "type-check: dashboard-frontend"
        entry: make dashboard-frontend:type-check
        language: system
        files: ^apps/dashboard-frontend/.*\.(ts|tsx|js|jsx)$
        pass_filenames: false
