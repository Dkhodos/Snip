name: Dashboard Frontend CI

on:
  workflow_call:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/dashboard-frontend/**"
      - ".github/workflows/dashboard-frontend.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/dashboard-frontend/**"
      - ".github/workflows/dashboard-frontend.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_COLOR: 1

jobs:
  ci:
    name: Lint, Type Check, Test & Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: apps/dashboard-frontend/pnpm-lock.yaml

      - name: Lint
        run: make dashboard-frontend:lint

      - name: Type-check
        run: make dashboard-frontend:type-check

      - name: Test
        run: make dashboard-frontend:test

      - name: Build
        run: make dashboard-frontend:build

  wait:
    name: Waiting for Terraform CI
    needs: ci
    if: vars.DEPLOYMENTS_ENABLED == 'true' && github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/wait-for-terraform

  deploy:
    name: Deploy to Pre-prod
    needs: [ci, wait]
    if: vars.DEPLOYMENTS_ENABLED == 'true' && github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    environment: pre-prod
    permissions:
      contents: read
      id-token: write

    env:
      PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      REGION: ${{ vars.GCP_REGION }}
      SERVICE: snip-frontend-${{ vars.ENVIRONMENT }}
      REPO: snip-${{ vars.ENVIRONMENT }}

    steps:
      - uses: actions/checkout@v6.0.2

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: "projects/${{ vars.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-pool-${{ vars.ENVIRONMENT }}/providers/github-provider"
          service_account: "snip-ci-deploy-${{ vars.ENVIRONMENT }}@${{ vars.GCP_PROJECT_ID }}.iam.gserviceaccount.com"

      - uses: google-github-actions/setup-gcloud@v3

      - name: Read frontend config from Parameter Manager
        id: config
        run: |
          CONFIG=$(gcloud parametermanager parameters versions describe current \
            --parameter=snip-frontend-config-${{ vars.ENVIRONMENT }} \
            --location=global \
            --format='value(payload.data)' | base64 -d)
          echo "VITE_CLERK_PUBLISHABLE_KEY=$(echo "$CONFIG" | jq -r '.clerk_publishable_key')" >> "$GITHUB_OUTPUT"
          echo "VITE_REDIRECT_BASE_URL=$(echo "$CONFIG" | jq -r '.redirect_base_url')" >> "$GITHUB_OUTPUT"

      - name: Resolve backend URL
        id: backend_url
        run: |
          URL=$(gcloud run services describe snip-backend-${{ vars.ENVIRONMENT }} \
            --region ${{ vars.GCP_REGION }} \
            --format 'value(status.url)')
          echo "url=${URL}" >> "$GITHUB_OUTPUT"

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/dashboard-frontend/Dockerfile
          push: true
          tags: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/dashboard-frontend:${{ github.sha }}
          build-args: |
            BASE_REGISTRY=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}
            VITE_CLERK_PUBLISHABLE_KEY=${{ steps.config.outputs.VITE_CLERK_PUBLISHABLE_KEY }}
            VITE_API_URL=/api
            VITE_REDIRECT_BASE_URL=${{ steps.config.outputs.VITE_REDIRECT_BASE_URL }}
          cache-from: type=gha,scope=dashboard-frontend
          cache-to: type=gha,mode=max,scope=dashboard-frontend

      - name: Deploy to Cloud Run
        run: |
          make dashboard-frontend:deploy \
            IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/dashboard-frontend:${{ github.sha }}" \
            SERVICE="${{ env.SERVICE }}" \
            REGION="${{ env.REGION }}" \
            BACKEND_URL="${{ steps.backend_url.outputs.url }}"

      - name: Prune old revisions
        uses: ./.github/actions/prune-revisions
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
