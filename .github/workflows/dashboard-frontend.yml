name: Dashboard Frontend CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/dashboard-frontend/**"
      - ".github/workflows/dashboard-frontend.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/dashboard-frontend/**"
      - ".github/workflows/dashboard-frontend.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_COLOR: 1

jobs:
  ci:
    name: Lint, Type Check, Test & Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: apps/dashboard-frontend/pnpm-lock.yaml

      - name: Lint
        run: make dashboard-frontend:lint

      - name: Type-check
        run: make dashboard-frontend:type-check

      - name: Test
        run: make dashboard-frontend:test

      - name: Build
        run: make dashboard-frontend:build

  deploy:
    name: Deploy to Pre-prod
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: pre-prod
    permissions:
      contents: read
      id-token: write

    env:
      PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      REGION: ${{ vars.GCP_REGION }}
      SERVICE: snip-frontend-${{ vars.ENVIRONMENT }}
      REPO: snip-${{ vars.ENVIRONMENT }}

    steps:
      - uses: actions/checkout@v6.0.2

      - id: auth
        uses: google-github-actions/auth@v2.1.13
        with:
          workload_identity_provider: "projects/${{ vars.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-pool-${{ vars.ENVIRONMENT }}/providers/github-provider"
          service_account: "snip-ci-deploy-${{ vars.ENVIRONMENT }}@${{ vars.GCP_PROJECT_ID }}.iam.gserviceaccount.com"

      - uses: google-github-actions/setup-gcloud@v2.2.1

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/dashboard-frontend:${{ github.sha }}"
          docker build \
            --build-arg VITE_CLERK_PUBLISHABLE_KEY="${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}" \
            --build-arg VITE_API_URL="${{ secrets.VITE_API_URL }}" \
            -t "$IMAGE" \
            -f apps/dashboard-frontend/Dockerfile .
          docker push "$IMAGE"

      - name: Deploy to Cloud Run
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/dashboard-frontend:${{ github.sha }}"
          gcloud run deploy ${{ env.SERVICE }} \
            --image "$IMAGE" \
            --region ${{ env.REGION }} \
            --quiet
