name: Base Images

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".devops/images/**"
      - ".github/workflows/base-images.yml"
  pull_request:
    branches: [main]
    paths:
      - ".devops/images/**"
      - ".github/workflows/base-images.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  wait:
    name: Waiting for Terraform CI
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/wait-for-terraform

  build:
    name: Build & Push ${{ matrix.name }}
    needs: wait
    if: ${{ !cancelled() && (needs.wait.result == 'success' || needs.wait.result == 'skipped') }}
    runs-on: ubuntu-latest
    environment: ${{ vars.ENVIRONMENT }}
    permissions:
      contents: read
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: python
            name: python-base
          - image: node
            name: node-base
            trivyignore: .devops/images/node/.trivyignore
          - image: nginx
            name: nginx-base

    env:
      REGION: ${{ vars.GCP_REGION }}
      IMAGE_REF: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/snip-base/${{ matrix.name }}

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .devops/images/${{ matrix.image }}
          load: true
          tags: |
            ${{ env.IMAGE_REF }}:${{ github.sha }}
            ${{ env.IMAGE_REF }}:latest
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_REF }}:${{ github.sha }}
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          trivyignores: ${{ matrix.trivyignore }}

      - id: auth
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: "projects/${{ vars.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-pool-${{ vars.ENVIRONMENT }}/providers/github-provider"
          service_account: "snip-ci-deploy-${{ vars.ENVIRONMENT }}@${{ vars.GCP_PROJECT_ID }}.iam.gserviceaccount.com"

      - name: Set up Cloud SDK
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Push image
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        run: |
          docker push "${{ env.IMAGE_REF }}:${{ github.sha }}"
          docker push "${{ env.IMAGE_REF }}:latest"
