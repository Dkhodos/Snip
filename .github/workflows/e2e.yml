name: E2E Tests

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/e2e/**"
      - ".github/workflows/e2e.yml"
  workflow_run:
    workflows:
      - "Dashboard Frontend CI"
      - "Dashboard Backend CI"
      - "Redirect Service CI"
      - "Click Worker CI"
    types: [completed]
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_COLOR: 1

jobs:
  setup:
    name: Auth Setup
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: pre-prod
    permissions:
      contents: read
      actions: read

    env:
      E2E_BASE_URL: ${{ vars.E2E_BASE_URL }}
      E2E_API_URL: ${{ vars.E2E_API_URL }}
      E2E_REDIRECT_URL: ${{ vars.E2E_REDIRECT_URL }}
      E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
      E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Wait for Deploy (if triggered)
        uses: ./.github/actions/wait-for-deploy

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: apps/e2e/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: apps/e2e
        run: pnpm install

      - name: Install Playwright browsers
        working-directory: apps/e2e
        run: pnpm exec playwright install chromium --with-deps

      - name: Run auth setup
        working-directory: apps/e2e
        run: pnpm test:setup

      - name: Upload auth state
        uses: actions/upload-artifact@v4
        with:
          name: storage-state-${{ github.run_id }}
          path: apps/e2e/storageState.json
          retention-days: 1

  e2e:
    name: E2E Tests
    needs: setup
    runs-on: ubuntu-latest
    environment: pre-prod
    permissions:
      contents: read

    env:
      E2E_BASE_URL: ${{ vars.E2E_BASE_URL }}
      E2E_API_URL: ${{ vars.E2E_API_URL }}
      E2E_REDIRECT_URL: ${{ vars.E2E_REDIRECT_URL }}
      E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
      E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: apps/e2e/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: apps/e2e
        run: pnpm install

      - name: Install Playwright browsers
        working-directory: apps/e2e
        run: pnpm exec playwright install chromium --with-deps

      - name: Download auth state
        uses: actions/download-artifact@v4
        with:
          name: storage-state-${{ github.run_id }}
          path: apps/e2e

      - name: Run E2E tests
        working-directory: apps/e2e
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-e2e-${{ github.run_id }}
          path: apps/e2e/playwright-report/
          retention-days: 14

  system:
    name: System Tests
    needs: setup
    runs-on: ubuntu-latest
    environment: pre-prod
    permissions:
      contents: read

    env:
      E2E_BASE_URL: ${{ vars.E2E_BASE_URL }}
      E2E_API_URL: ${{ vars.E2E_API_URL }}
      E2E_REDIRECT_URL: ${{ vars.E2E_REDIRECT_URL }}
      E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
      E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: apps/e2e/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: apps/e2e
        run: pnpm install

      - name: Install Playwright browsers
        working-directory: apps/e2e
        run: pnpm exec playwright install chromium --with-deps

      - name: Download auth state
        uses: actions/download-artifact@v4
        with:
          name: storage-state-${{ github.run_id }}
          path: apps/e2e

      - name: Run system tests
        working-directory: apps/e2e
        run: pnpm test:system

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-system-${{ github.run_id }}
          path: apps/e2e/playwright-report/
          retention-days: 14
