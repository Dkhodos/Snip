name: Redirect Service CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/redirect-service/**"
      - "packages/db/**"
      - "packages/queue/**"
      - "packages/logger/**"
      - "uv.lock"
      - "pyproject.toml"
      - ".github/workflows/redirect-service.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/redirect-service/**"
      - "packages/db/**"
      - "packages/queue/**"
      - "packages/logger/**"
      - "uv.lock"
      - "pyproject.toml"
      - ".github/workflows/redirect-service.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_SYSTEM_PYTHON: 1
  FORCE_COLOR: 1

jobs:
  ci:
    name: Lint, Type Check & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Lint
        run: make redirect-service:lint

      - name: Type Check
        run: make redirect-service:type:check

      - name: Unit Tests
        run: make redirect-service:test:unit

  deploy:
    name: Deploy to Pre-prod
    needs: ci
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    environment: pre-prod
    permissions:
      contents: read
      id-token: write
      actions: read

    env:
      PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      REGION: ${{ vars.GCP_REGION }}
      SERVICE: snip-redirect-${{ vars.ENVIRONMENT }}
      REPO: snip-${{ vars.ENVIRONMENT }}

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Wait for Terraform (if triggered)
        uses: ./.github/actions/wait-for-terraform

      - name: Wait for Migrations (if triggered)
        uses: ./.github/actions/wait-for-migrate

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: "projects/${{ vars.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-pool-${{ vars.ENVIRONMENT }}/providers/github-provider"
          service_account: "snip-ci-deploy-${{ vars.ENVIRONMENT }}@${{ vars.GCP_PROJECT_ID }}.iam.gserviceaccount.com"

      - uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/redirect-service/Dockerfile
          push: true
          tags: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/redirect-service:${{ github.sha }}
          build-args: |
            BASE_REGISTRY=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}
          cache-from: type=gha,scope=redirect-service
          cache-to: type=gha,mode=max,scope=redirect-service

      - name: Deploy to Cloud Run
        run: |
          make redirect-service:deploy \
            IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/redirect-service:${{ github.sha }}" \
            SERVICE="${{ env.SERVICE }}" \
            REGION="${{ env.REGION }}"
