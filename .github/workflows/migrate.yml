name: Migrate

on:
  workflow_call:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "packages/db/**"
      - "uv.lock"
      - "pyproject.toml"
      - ".github/workflows/migrate.yml"

concurrency:
  group: migrate-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_COLOR: 1

jobs:
  wait:
    name: Waiting for DB Package CI & Terraform
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Waiting for DB Package CI
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = context.sha;
            const workflowName = 'DB Package CI';

            const { data: { workflow_runs: runs } } = await github.rest.actions.listWorkflowRunsForRepo({
              owner, repo, head_sha: sha, event: 'push',
            });
            const ciRun = runs.find(r => r.name === workflowName);

            if (!ciRun) {
              core.info('No DB Package CI run found for this commit — skipping wait.');
              return;
            }

            core.info(`Found DB Package CI run #${ciRun.run_number} (${ciRun.status})`);
            const start = Date.now();
            const timeout = 600_000;
            const poll = 15_000;

            while (true) {
              const { data: run } = await github.rest.actions.getWorkflowRun({
                owner, repo, run_id: ciRun.id,
              });

              if (run.status === 'completed') {
                if (run.conclusion === 'success') {
                  core.info('DB Package CI succeeded — proceeding with migrations.');
                  return;
                }
                core.setFailed(`DB Package CI finished with conclusion: ${run.conclusion}`);
                return;
              }

              if (Date.now() - start > timeout) {
                core.setFailed(`Timed out waiting for DB Package CI (${timeout / 1000}s).`);
                return;
              }

              core.info(`DB Package CI still ${run.status} — waiting ${poll / 1000}s...`);
              await new Promise(r => setTimeout(r, poll));
            }

      - uses: ./.github/actions/wait-for-terraform

  migrate:
    name: Run DB Migrations
    needs: wait
    runs-on: ubuntu-latest
    environment: pre-prod
    permissions:
      contents: read
      id-token: write

    env:
      PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      REGION: ${{ vars.GCP_REGION }}
      JOB: snip-migrate-${{ vars.ENVIRONMENT }}
      REPO: snip-${{ vars.ENVIRONMENT }}

    steps:
      - uses: actions/checkout@v6.0.2

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: "projects/${{ vars.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-pool-${{ vars.ENVIRONMENT }}/providers/github-provider"
          service_account: "snip-ci-deploy-${{ vars.ENVIRONMENT }}@${{ vars.GCP_PROJECT_ID }}.iam.gserviceaccount.com"

      - uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push migration image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/db/Dockerfile
          push: true
          tags: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/migrate:${{ github.sha }}
          build-args: |
            BASE_REGISTRY=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}
          cache-from: type=gha,scope=migrate
          cache-to: type=gha,mode=max,scope=migrate

      - name: Update Cloud Run Job image
        run: |
          gcloud run jobs update ${{ env.JOB }} \
            --image "${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/migrate:${{ github.sha }}" \
            --region ${{ env.REGION }}

      - name: Execute migrations
        run: |
          # Start job asynchronously so we can stream logs while it runs
          gcloud run jobs execute "$JOB" \
            --region "$REGION" \
            --async 2>&1 | tee /tmp/exec_output.txt

          # Extract execution name from output (e.g. "projects/.../executions/my-job-xxxxx")
          EXECUTION=$(gcloud run jobs executions list \
            --job="$JOB" --region="$REGION" \
            --limit=1 --sort-by="~createTime" \
            --format="value(name)")
          EXEC_SHORT=$(basename "$EXECUTION")
          echo "▶ Execution started: $EXEC_SHORT"

          LOG_FILTER="resource.type=\"cloud_run_job\"
            AND resource.labels.job_name=\"$JOB\"
            AND labels.\"run.googleapis.com/execution_name\"=\"$EXEC_SHORT\""
          SEEN_LOGS=""

          # Poll until execution completes, streaming logs on each iteration
          START_TIME=$SECONDS
          TIMEOUT=600  # 10 minutes

          while true; do
            if (( SECONDS - START_TIME > TIMEOUT )); then
              echo "❌ Timed out after ${TIMEOUT}s waiting for migration to complete"
              exit 1
            fi

            STATUS=$(gcloud run jobs executions describe "$EXECUTION" \
              --region="$REGION" \
              --format="value(status.conditions.filter(type='Completed').map().extract(status).flatten())")

            # Fetch and display new log entries
            NEW_LOGS=$(gcloud logging read "$LOG_FILTER" \
              --project="$PROJECT_ID" \
              --limit=200 --freshness=10m \
              --order=asc \
              --format="value(timestamp, textPayload)" 2>/dev/null || true)

            if [[ -n "$NEW_LOGS" ]]; then
              # Only print lines we haven't seen yet
              DIFF=$(comm -13 <(echo "$SEEN_LOGS" | sort) <(echo "$NEW_LOGS" | sort) | sort)
              if [[ -n "$DIFF" ]]; then
                echo "$DIFF"
                SEEN_LOGS="$NEW_LOGS"
              fi
            fi

            if [[ "$STATUS" == "True" ]]; then
              echo "✅ Migrations completed successfully"
              exit 0
            fi

            # Check for failure
            FAILED=$(gcloud run jobs executions describe "$EXECUTION" \
              --region="$REGION" \
              --format="value(status.conditions.filter(type='Failed').map().extract(status).flatten())" 2>/dev/null || true)

            if [[ "$FAILED" == "True" ]]; then
              echo "❌ Migration execution failed"
              # Print final batch of logs
              gcloud logging read "$LOG_FILTER" \
                --project="$PROJECT_ID" \
                --limit=500 --freshness=15m \
                --order=asc \
                --format="value(timestamp, textPayload)" 2>/dev/null || true
              exit 1
            fi

            echo "⏳ Still running... (polling in 10s)"
            sleep 10
          done
