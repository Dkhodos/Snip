name: Security Scans

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_SYSTEM_PYTHON: 1
  FORCE_COLOR: 1

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      python-deps: ${{ steps.filter.outputs.python-deps }}
      node-deps: ${{ steps.filter.outputs.node-deps }}
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            python-deps:
              - 'uv.lock'
              - 'pyproject.toml'
            node-deps:
              - 'apps/dashboard-frontend/pnpm-lock.yaml'
              - 'apps/dashboard-frontend/package.json'
              - 'apps/e2e/pnpm-lock.yaml'
              - 'apps/e2e/package.json'

  python-deps:
    name: Python Dependency Audit
    needs: changes
    if: needs.changes.outputs.python-deps == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Export requirements from uv lockfile
        run: |
          uv export --no-hashes --all-packages --frozen \
            | grep -v '^-e ' \
            | grep -v '^[[:space:]]*#' \
            | grep -v '^#' \
            | grep -v '^$' \
            > /tmp/requirements.txt

      - name: Run pip-audit
        run: uv run pip-audit -r /tmp/requirements.txt --desc || true

      - name: Summary
        if: always()
        run: |
          echo "## Python Dependency Audit" >> "$GITHUB_STEP_SUMMARY"
          echo "Ran \`pip-audit\` against all workspace dependencies exported from \`uv.lock\`." >> "$GITHUB_STEP_SUMMARY"

  node-deps:
    name: Node.js Dependency Audit
    needs: changes
    if: needs.changes.outputs.node-deps == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: apps/dashboard-frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: apps/dashboard-frontend
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit
        working-directory: apps/dashboard-frontend
        run: pnpm audit --prod || true

      - name: Summary
        if: always()
        run: |
          echo "## Node.js Dependency Audit" >> "$GITHUB_STEP_SUMMARY"
          echo "Ran \`pnpm audit --prod\` against \`apps/dashboard-frontend\` production dependencies." >> "$GITHUB_STEP_SUMMARY"

  bandit:
    name: Bandit (Python SAST)
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: astral-sh/setup-uv@v8.0.0

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Install Bandit
        run: uv tool install bandit

      - name: Run Bandit
        run: |
          bandit -r \
            apps/dashboard-backend/src \
            apps/redirect-service/src \
            apps/click-worker/src \
            packages/analytics/src \
            packages/auth/src \
            packages/db/src \
            packages/email/src \
            packages/logger/src \
            packages/queue/src \
            packages/storage/src \
            --severity-level medium \
            --confidence-level medium \
            -x '*/tests/*' \
            || true

      - name: Summary
        if: always()
        run: |
          echo "## Bandit Python SAST" >> "$GITHUB_STEP_SUMMARY"
          echo "Ran Bandit against all Python \`src/\` directories (medium+ severity, medium+ confidence)." >> "$GITHUB_STEP_SUMMARY"

  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep
        run: |
          semgrep scan \
            --config auto \
            --severity WARNING \
            --exclude 'node_modules' \
            --exclude '*.lock' \
            --exclude 'dist' \
            --exclude 'terraform' \
            . || true

      - name: Summary
        if: always()
        run: |
          echo "## Semgrep SAST" >> "$GITHUB_STEP_SUMMARY"
          echo "Ran Semgrep with community rules against Python and TypeScript/JavaScript code (WARNING+ severity)." >> "$GITHUB_STEP_SUMMARY"
