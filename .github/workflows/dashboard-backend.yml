name: Dashboard Backend CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/dashboard-backend/**"
      - "packages/db/**"
      - "packages/email/**"
      - "packages/auth/**"
      - "packages/logger/**"
      - "uv.lock"
      - "pyproject.toml"
      - ".github/workflows/dashboard-backend.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/dashboard-backend/**"
      - "packages/db/**"
      - "packages/email/**"
      - "packages/auth/**"
      - "packages/logger/**"
      - "uv.lock"
      - "pyproject.toml"
      - ".github/workflows/dashboard-backend.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_SYSTEM_PYTHON: 1
  FORCE_COLOR: 1

jobs:
  ci:
    name: Lint, Type Check & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Lint
        run: make dashboard-backend:lint

      - name: Type Check
        run: make dashboard-backend:type:check

      - name: Unit Tests
        run: make dashboard-backend:test:unit

  deploy:
    name: Deploy to Pre-prod
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: pre-prod
    permissions:
      contents: read
      id-token: write
      actions: read

    env:
      PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      REGION: ${{ vars.GCP_REGION }}
      SERVICE: snip-backend-${{ vars.ENVIRONMENT }}
      REPO: snip-${{ vars.ENVIRONMENT }}

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Wait for Terraform (if triggered)
        uses: ./.github/actions/wait-for-terraform

      - id: auth
        uses: google-github-actions/auth@v2.1.13
        with:
          workload_identity_provider: "projects/${{ vars.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-pool-${{ vars.ENVIRONMENT }}/providers/github-provider"
          service_account: "snip-ci-deploy-${{ vars.ENVIRONMENT }}@${{ vars.GCP_PROJECT_ID }}.iam.gserviceaccount.com"

      - uses: google-github-actions/setup-gcloud@v2.2.1

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/dashboard-backend:${{ github.sha }}"
          docker build -t "$IMAGE" -f apps/dashboard-backend/Dockerfile .
          docker push "$IMAGE"

      - name: Deploy to Cloud Run
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/dashboard-backend:${{ github.sha }}"
          gcloud run deploy ${{ env.SERVICE }} \
            --image "$IMAGE" \
            --region ${{ env.REGION }} \
            --quiet
