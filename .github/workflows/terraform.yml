name: Terraform CI

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

env:
  TF_VERSION: "1.9.8"
  TG_VERSION: "0.86.2"

jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    environment: pre-prod
    permissions:
      contents: read
      id-token: write
      pull-requests: write

    env:
      WORKING_DIR: terraform/environments/${{ vars.ENVIRONMENT }}
      TF_VAR_clerk_publishable_key: ${{ secrets.TF_VAR_clerk_publishable_key }}
      TF_VAR_clerk_secret_key: ${{ secrets.TF_VAR_clerk_secret_key }}
      TF_VAR_resend_api_key: ${{ secrets.TF_VAR_resend_api_key }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_DNS_API_TOKEN }}

    steps:
      - uses: actions/checkout@v6.0.2

      - id: auth
        uses: google-github-actions/auth@v2.1.13
        with:
          workload_identity_provider: "projects/${{ vars.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-pool-${{ vars.ENVIRONMENT }}/providers/github-provider"
          service_account: "snip-terraform-ci-${{ vars.ENVIRONMENT }}@${{ vars.GCP_PROJECT_ID }}.iam.gserviceaccount.com"

      - uses: hashicorp/setup-terraform@v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Install Terragrunt
        run: |
          curl -sL "https://github.com/gruntwork-io/terragrunt/releases/download/v${TG_VERSION}/terragrunt_linux_amd64" \
            -o /usr/local/bin/terragrunt
          chmod +x /usr/local/bin/terragrunt

      - name: Terragrunt Init
        working-directory: ${{ env.WORKING_DIR }}
        run: terragrunt init --all --non-interactive

      - name: Terragrunt Plan
        id: plan
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terragrunt plan --all --non-interactive -no-color 2>&1 | tee plan_output.txt
        continue-on-error: true

      - name: Post Plan to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ env.WORKING_DIR }}/plan_output.txt', 'utf8');
            const truncated = plan.length > 60000
              ? plan.substring(0, 60000) + '\n... (truncated)'
              : plan;
            const body = `### Terraform Plan\n\`\`\`\n${truncated}\n\`\`\`\n**Status:** ${{ steps.plan.outcome }}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: pre-prod
    permissions:
      contents: read
      id-token: write

    env:
      WORKING_DIR: terraform/environments/${{ vars.ENVIRONMENT }}
      TF_VAR_clerk_publishable_key: ${{ secrets.TF_VAR_clerk_publishable_key }}
      TF_VAR_clerk_secret_key: ${{ secrets.TF_VAR_clerk_secret_key }}
      TF_VAR_resend_api_key: ${{ secrets.TF_VAR_resend_api_key }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_DNS_API_TOKEN }}

    steps:
      - uses: actions/checkout@v6.0.2

      - id: auth
        uses: google-github-actions/auth@v2.1.13
        with:
          workload_identity_provider: "projects/${{ vars.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-pool-${{ vars.ENVIRONMENT }}/providers/github-provider"
          service_account: "snip-terraform-ci-${{ vars.ENVIRONMENT }}@${{ vars.GCP_PROJECT_ID }}.iam.gserviceaccount.com"

      - uses: hashicorp/setup-terraform@v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Install Terragrunt
        run: |
          curl -sL "https://github.com/gruntwork-io/terragrunt/releases/download/v${TG_VERSION}/terragrunt_linux_amd64" \
            -o /usr/local/bin/terragrunt
          chmod +x /usr/local/bin/terragrunt

      - name: Terragrunt Init
        working-directory: ${{ env.WORKING_DIR }}
        run: terragrunt init --all --non-interactive

      - name: Terragrunt Apply
        working-directory: ${{ env.WORKING_DIR }}
        run: terragrunt apply --all --non-interactive -auto-approve
