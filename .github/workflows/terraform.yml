name: Terraform CI

on:
  workflow_call:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

env:
  TF_VERSION: "1.9.8"
  TG_VERSION: "0.86.2"

jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    environment: pre-prod
    permissions:
      contents: read
      id-token: write
      pull-requests: write

    env:
      GH_ORG: ${{ github.repository_owner }}
      GH_REPO: ${{ github.event.repository.name }}
      DOMAIN: ${{ vars.DOMAIN }}
      CLOUDFLARE_ZONE_ID: ${{ vars.CLOUDFLARE_ZONE_ID }}
      ENVIRONMENT: ${{ vars.ENVIRONMENT }}

    steps:
      - uses: actions/checkout@v6.0.2

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: "projects/${{ vars.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-pool-${{ vars.ENVIRONMENT }}/providers/github-provider"
          service_account: "snip-terraform-ci-${{ vars.ENVIRONMENT }}@${{ vars.GCP_PROJECT_ID }}.iam.gserviceaccount.com"

      - id: secrets
        uses: google-github-actions/get-secretmanager-secrets@v3
        with:
          secrets: |-
            CLOUDFLARE_API_TOKEN:projects/${{ vars.GCP_PROJECT_ID }}/secrets/snip-cloudflare-api-token/versions/latest

      - uses:  hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Install Terragrunt
        run: |
          curl -sL "https://github.com/gruntwork-io/terragrunt/releases/download/v${TG_VERSION}/terragrunt_linux_amd64" \
            -o /usr/local/bin/terragrunt
          chmod +x /usr/local/bin/terragrunt

      - name: Terraform Plan
        id: plan
        run: make terraform:plan 2>&1 | tee terraform/environments/${{ vars.ENVIRONMENT }}/plan_output.txt
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ steps.secrets.outputs.CLOUDFLARE_API_TOKEN }}

      - name: Post Plan to PR
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/environments/${{ vars.ENVIRONMENT }}/plan_output.txt', 'utf8');
            const truncated = plan.length > 60000
              ? plan.substring(0, 60000) + '\n... (truncated)'
              : plan;
            const body = `### Terraform Plan\n\`\`\`\n${truncated}\n\`\`\`\n**Status:** ${{ steps.plan.outcome }}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

  scan:
    name: Checkov Security Scan
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'pull_request') ||
      (github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch'))
    needs: []
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: astral-sh/setup-uv@v6

      - name: Run Checkov
        run: make terraform:check

  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: [scan]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    environment: pre-prod
    permissions:
      contents: read
      id-token: write

    env:
      GH_ORG: ${{ github.repository_owner }}
      GH_REPO: ${{ github.event.repository.name }}
      DOMAIN: ${{ vars.DOMAIN }}
      CLOUDFLARE_ZONE_ID: ${{ vars.CLOUDFLARE_ZONE_ID }}
      ENVIRONMENT: ${{ vars.ENVIRONMENT }}

    steps:
      - uses: actions/checkout@v6.0.2

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: "projects/${{ vars.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-pool-${{ vars.ENVIRONMENT }}/providers/github-provider"
          service_account: "snip-terraform-ci-${{ vars.ENVIRONMENT }}@${{ vars.GCP_PROJECT_ID }}.iam.gserviceaccount.com"

      - id: secrets
        uses: google-github-actions/get-secretmanager-secrets@v3
        with:
          secrets: |-
            CLOUDFLARE_API_TOKEN:projects/${{ vars.GCP_PROJECT_ID }}/secrets/snip-cloudflare-api-token/versions/latest

      - uses:  hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Install Terragrunt
        run: |
          curl -sL "https://github.com/gruntwork-io/terragrunt/releases/download/v${TG_VERSION}/terragrunt_linux_amd64" \
            -o /usr/local/bin/terragrunt
          chmod +x /usr/local/bin/terragrunt

      - name: Terraform Apply
        run: make terraform:apply
        env:
          CLOUDFLARE_API_TOKEN: ${{ steps.secrets.outputs.CLOUDFLARE_API_TOKEN }}
