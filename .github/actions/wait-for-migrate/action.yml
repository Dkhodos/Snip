name: Wait for Migrate
description: Waits for the Migrate workflow to complete (if triggered for the same commit)

inputs:
  poll-interval:
    description: Seconds between status checks
    default: "15"
  timeout:
    description: Maximum seconds to wait
    default: "600"
  on-failure:
    description: What to do when the Migrate workflow fails — "fail" or "skip"
    default: "fail"

runs:
  using: composite
  steps:
    - name: Waiting for Migrate
      uses: actions/github-script@v8
      with:
        script: |
          const { default: script } = await import('${{ github.workspace }}/.github/actions/wait-for-migrate/script.js')
          await script({
            github, context, core,
            pollInterval: ${{ inputs.poll-interval }} * 1000,
            timeout: ${{ inputs.timeout }} * 1000,
            onFailure: '${{ inputs.on-failure }}',
          })
